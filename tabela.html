<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>kakaw · tabela</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Mono:wght@300;400&family=Jost:wght@200;300&family=Playfair+Display:ital,wght@1,400;1,700&display=swap" rel="stylesheet"/>
<style>
  :root{--bg:#F5EFE2;--bgCard:#EDE5D4;--div:#DDD4BC;--verde:#3A5C2C;--choco:#5C3418;--cara:#A07828;--dark:#1A1208;--muted:#8A7860;--mutedL:#B0A890;--white:#FFFCF5;}
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{background:var(--bg);}
  .ham{background:none;border:none;cursor:pointer;padding:6px;display:flex;flex-direction:column;gap:5px;}
  .ham span{display:block;width:20px;height:1px;background:var(--verde);}
  .ham span:nth-child(2){width:13px;}
  @keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  @keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
  @keyframes florGira{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
  .fade-up{animation:fadeUp .5s ease both;}
  .skeleton-row{height:56px;border-radius:3px;margin-bottom:8px;background:linear-gradient(90deg,var(--div) 25%,var(--bgCard) 50%,var(--div) 75%);background-size:200% 100%;animation:shimmer 1.4s ease-in-out infinite;}
  .inp-busca{width:100%;padding:11px 14px;background:var(--white);border:1px solid var(--div);border-radius:5px;font-family:'Jost',sans-serif;font-weight:300;font-size:.95rem;color:var(--dark);outline:none;transition:border .2s;}
  .inp-busca:focus{border-color:var(--verde);}
  .inp-busca::placeholder{color:var(--mutedL);}
  .cliente-card{background:var(--white);border:1px solid var(--div);border-radius:5px;margin-bottom:10px;overflow:hidden;transition:box-shadow .2s;}
  .cliente-card:hover{box-shadow:0 2px 12px rgba(26,18,8,.08);}
  .cliente-header{padding:14px 16px;display:flex;align-items:center;cursor:pointer;border-bottom:1px solid transparent;transition:border-color .2s;gap:12px;}
  .cliente-card.aberto .cliente-header{border-bottom-color:var(--div);}
  .cliente-nome{font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:300;font-size:1.18rem;color:var(--dark);flex:1;}
  .cliente-valor{font-family:'DM Mono',monospace;font-size:.5rem;letter-spacing:.1em;font-weight:400;}
  .cliente-valor.deve{color:var(--choco);}
  .cliente-valor.credito{color:var(--cara);}
  .cliente-valor.quitado{color:var(--mutedL);}
  .cliente-valor-pago{font-family:'DM Mono',monospace;font-size:.38rem;letter-spacing:.06em;color:var(--verde);margin-top:2px;}
  .cliente-chevron{font-size:.7rem;color:var(--mutedL);transition:transform .25s;margin-left:6px;}
  .cliente-card.aberto .cliente-chevron{transform:rotate(180deg);}
  .cliente-pills{display:flex;gap:6px;margin-top:3px;flex-wrap:wrap;}
  .pill{font-family:'DM Mono',monospace;font-size:.44rem;letter-spacing:.15em;text-transform:uppercase;padding:3px 8px;border-radius:20px;}
  .pill-trufa{background:#F0E8E2;color:var(--choco);}
  .pill-cone{background:#E4EDE2;color:var(--verde);}
  .pill-outro{background:#F0EBE0;color:var(--cara);}
  /* pedidos expandidos */
  .pedidos-lista{display:none;padding:0 16px 8px;}
  .cliente-card.aberto .pedidos-lista{display:block;}
  .pedido-row{display:flex;align-items:center;padding:8px 0;border-bottom:1px solid var(--bg);gap:10px;}
  .pedido-row:last-child{border-bottom:none;}
  .pedido-data{font-family:'DM Mono',monospace;font-size:.46rem;letter-spacing:.15em;color:var(--mutedL);width:38px;flex-shrink:0;}
  .pedido-desc{font-family:'Jost',sans-serif;font-weight:300;font-size:.88rem;color:var(--dark);flex:1;}
  .pedido-val{font-family:'DM Mono',monospace;font-size:.48rem;letter-spacing:.1em;color:var(--muted);flex-shrink:0;}
  /* resumo de pagamentos */
  .pag-resumo{border-top:1px solid var(--div);padding:10px 16px 12px;background:rgba(58,92,44,.02);}
  .pag-resumo-titulo{font-family:'DM Mono',monospace;font-size:.40rem;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);margin-bottom:6px;}
  .pag-resumo-row{display:flex;align-items:center;padding:4px 0;gap:10px;border-bottom:1px solid var(--bg);}
  .pag-resumo-row:last-child{border-bottom:none;}
  .pag-resumo-data{font-family:'DM Mono',monospace;font-size:.42rem;letter-spacing:.1em;color:var(--mutedL);width:36px;flex-shrink:0;}
  .pag-resumo-desc{font-family:'Jost',sans-serif;font-weight:300;font-size:.85rem;color:var(--dark);flex:1;}
  .pag-resumo-val{font-family:'DM Mono',monospace;font-size:.44rem;color:var(--verde);flex-shrink:0;}
  .saldo-linha{display:flex;justify-content:space-between;align-items:center;padding:8px 0 0;border-top:1px solid var(--div);margin-top:4px;}
  .saldo-linha-lbl{font-family:'DM Mono',monospace;font-size:.42rem;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);}
  .saldo-linha-val{font-family:'DM Mono',monospace;font-size:.48rem;letter-spacing:.05em;}
  /* totais */
  .totais-bar{background:var(--dark);padding:16px 8vw;display:flex;gap:0;position:sticky;bottom:0;z-index:40;}
  .total-item{flex:1;text-align:center;border-right:1px solid rgba(255,255,255,.08);}
  .total-item:last-child{border-right:none;}
  .total-label{font-family:'DM Mono',monospace;font-size:.40rem;letter-spacing:.28em;text-transform:uppercase;color:rgba(255,255,255,.35);margin-bottom:4px;}
  .total-val{font-family:'DM Mono',monospace;font-size:.52rem;letter-spacing:.05em;color:var(--bg);}
  .total-val.destaque{color:#8FBF7A;}
  .empty{text-align:center;padding:3rem 2rem;}
  #loading-overlay{position:fixed;inset:0;background:var(--bg);z-index:200;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:1rem;transition:opacity .4s;}
  #loading-overlay.hide{opacity:0;pointer-events:none;}
</style>
</head>
<body>
<div id="loading-overlay">
  <svg width="48" height="48" viewBox="0 0 96 96" fill="none"><circle cx="48" cy="48" r="10" stroke="#3A5C2C" stroke-width="1.5"/><circle cx="48" cy="48" r="4" fill="#3A5C2C"/><g style="animation:florGira 2s linear infinite;transform-origin:48px 48px;"><path d="M48 38 C43 26 31 25 30 35 C29 45 40 47 48 38Z" fill="#3A5C2C" opacity=".12" stroke="#3A5C2C" stroke-width="1.1"/><path d="M58 48 C70 43 71 31 61 30 C51 29 49 40 58 48Z" fill="#5C3418" opacity=".12" stroke="#5C3418" stroke-width="1.1"/><path d="M48 58 C53 70 65 71 66 61 C67 51 56 49 48 58Z" fill="#3A5C2C" opacity=".12" stroke="#3A5C2C" stroke-width="1.1"/><path d="M38 48 C26 53 25 65 35 66 C45 67 47 56 38 48Z" fill="#5C3418" opacity=".12" stroke="#5C3418" stroke-width="1.1"/></g></svg>
  <div style="font-family:'DM Mono',monospace;font-size:.48rem;letter-spacing:.35em;text-transform:uppercase;color:var(--muted);">carregando...</div>
</div>

<div style="background:var(--bg);min-height:100vh;padding-bottom:80px;">
  <div style="padding:16px 20px;display:flex;align-items:center;background:var(--bg);border-bottom:1px solid var(--div);position:sticky;top:0;z-index:50;">
    <button class="ham" onclick="openMenu()"><span></span><span></span><span></span></button>
    <div style="flex:1;display:flex;justify-content:center;align-items:center;gap:10px;">
      <svg width="24" height="24" viewBox="0 0 96 96" fill="none"><circle cx="48" cy="48" r="10" stroke="#3A5C2C" stroke-width="1.5"/><circle cx="48" cy="48" r="4" fill="#3A5C2C"/><path d="M48 38 C43 26 31 25 30 35 C29 45 40 47 48 38Z" fill="#3A5C2C" opacity=".12" stroke="#3A5C2C" stroke-width="1.1"/><path d="M58 48 C70 43 71 31 61 30 C51 29 49 40 58 48Z" fill="#5C3418" opacity=".12" stroke="#5C3418" stroke-width="1.1"/><path d="M48 58 C53 70 65 71 66 61 C67 51 56 49 48 58Z" fill="#3A5C2C" opacity=".12" stroke="#3A5C2C" stroke-width="1.1"/><path d="M38 48 C26 53 25 65 35 66 C45 67 47 56 38 48Z" fill="#5C3418" opacity=".12" stroke="#5C3418" stroke-width="1.1"/></svg>
      <div style="font-family:'Playfair Display',serif;font-style:italic;font-weight:400;font-size:1.28rem;color:var(--dark);">kakaw</div>
    </div>
    <div style="width:34px;"></div>
  </div>

  <div style="padding:2rem 8vw .8rem;display:flex;align-items:baseline;gap:1.5rem;">
    <span style="font-family:'DM Mono',monospace;font-size:.52rem;letter-spacing:.4em;text-transform:uppercase;color:var(--mutedL);">02</span>
    <span style="font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:300;font-size:1.5rem;color:var(--dark);">Tabela</span>
    <div style="flex:1;height:1px;background:var(--div);margin-bottom:3px;"></div>
    <span style="font-family:'DM Mono',monospace;font-size:.48rem;letter-spacing:.2em;text-transform:uppercase;color:var(--mutedL);">débitos ativos</span>
    <a href="calendario.html" style="font-family:'DM Mono',monospace;font-size:.44rem;letter-spacing:.2em;text-transform:uppercase;color:var(--verde);text-decoration:none;border-bottom:1px solid rgba(58,92,44,.3);padding-bottom:1px;white-space:nowrap;transition:opacity .2s;" onmouseover="this.style.opacity='.6'" onmouseout="this.style.opacity='1'">ver calendário →</a>
  </div>

  <div style="padding:0 8vw 1.2rem;"><input class="inp-busca" id="inp-busca" placeholder="buscar cliente..." oninput="filtrar(this.value)"/></div>

  <div id="skeleton" style="padding:0 8vw;"><div class="skeleton-row"></div><div class="skeleton-row"></div><div class="skeleton-row"></div><div class="skeleton-row"></div></div>
  <div id="lista" style="padding:0 8vw;display:none;"></div>
  <div id="empty" style="display:none;" class="empty">
    <svg width="40" height="40" viewBox="0 0 96 96" fill="none" style="opacity:.25;margin-bottom:12px;"><circle cx="48" cy="48" r="10" stroke="#3A5C2C" stroke-width="1.5"/><circle cx="48" cy="48" r="4" fill="#3A5C2C"/><path d="M48 38 C43 26 31 25 30 35 C29 45 40 47 48 38Z" fill="#3A5C2C" opacity=".12" stroke="#3A5C2C" stroke-width="1.1"/><path d="M58 48 C70 43 71 31 61 30 C51 29 49 40 58 48Z" fill="#5C3418" opacity=".12" stroke="#5C3418" stroke-width="1.1"/><path d="M48 58 C53 70 65 71 66 61 C67 51 56 49 48 58Z" fill="#3A5C2C" opacity=".12" stroke="#3A5C2C" stroke-width="1.1"/><path d="M38 48 C26 53 25 65 35 66 C45 67 47 56 38 48Z" fill="#5C3418" opacity=".12" stroke="#5C3418" stroke-width="1.1"/></svg>
    <div style="font-family:'Cormorant Garamond',serif;font-style:italic;font-size:1.28rem;color:var(--muted);">nenhum débito encontrado</div>
    <div style="font-family:'DM Mono',monospace;font-size:.46rem;letter-spacing:.2em;text-transform:uppercase;color:var(--mutedL);margin-top:6px;">todos em dia ✦</div>
  </div>
</div>

<div class="totais-bar">
  <div class="total-item"><div class="total-label">clientes</div><div class="total-val" id="tot-clientes">—</div></div>
  <div class="total-item"><div class="total-label">trufas</div><div class="total-val" id="tot-trufas">—</div></div>
  <div class="total-item"><div class="total-label">cones</div><div class="total-val" id="tot-cones">—</div></div>
  <div class="total-item"><div class="total-label">a receber</div><div class="total-val destaque" id="tot-valor">—</div></div>
</div>

<footer style="background:var(--bg);border-top:1px solid var(--div);padding:1.2rem 8vw;text-align:center;">
  <div style="display:flex;flex-direction:column;align-items:center;gap:.5rem;">
    <svg width="20" height="20" viewBox="0 0 96 96" fill="none"><circle cx="48" cy="48" r="10" stroke="#3A5C2C" stroke-width="1.5"/><circle cx="48" cy="48" r="4" fill="#3A5C2C"/><path d="M48 38 C43 26 31 25 30 35 C29 45 40 47 48 38Z" fill="#3A5C2C" opacity=".12" stroke="#3A5C2C" stroke-width="1.1"/><path d="M58 48 C70 43 71 31 61 30 C51 29 49 40 58 48Z" fill="#5C3418" opacity=".12" stroke="#5C3418" stroke-width="1.1"/><path d="M48 58 C53 70 65 71 66 61 C67 51 56 49 48 58Z" fill="#3A5C2C" opacity=".12" stroke="#3A5C2C" stroke-width="1.1"/><path d="M38 48 C26 53 25 65 35 66 C45 67 47 56 38 48Z" fill="#5C3418" opacity=".12" stroke="#5C3418" stroke-width="1.1"/></svg>
    <div style="font-family:'DM Mono',monospace;font-size:.46rem;letter-spacing:.3em;text-transform:uppercase;color:var(--mutedL);">kakaw · doces artesanais</div>
  </div>
</footer>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, getDocs, query, orderBy }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const app=initializeApp({apiKey:"AIzaSyCv8YuWm13yscXDWfkIRvFtRy6ZVO0Wgok",authDomain:"kakaw-web.firebaseapp.com",projectId:"kakaw-web",storageBucket:"kakaw-web.firebasestorage.app",messagingSenderId:"229104514189",appId:"1:229104514189:web:3ae6c7c3de736f508e9ec4"});
  const db=getFirestore(app), PRECO={Trufa:3,Cone:10};
  let todosClientes=[];

  const fmtR=n=>"R$"+n.toFixed(2).replace(".",",");
  const calcDivida=ps=>ps.reduce((a,p)=>a+(p.produto==="Outro"?(p.preco||0)*p.quantidade:(PRECO[p.produto]||0)*p.quantidade),0);
  const calcPago=pgs=>(pgs||[]).reduce((a,p)=>a+(p.valor||0),0);
  const calcSaldo=c=>calcDivida(c.pedidos)-calcPago(c.pagamentos);

  async function carregar(){
    const snapC=await getDocs(collection(db,"clientes"));
    const lista=[];
    for(const docC of snapC.docs){
      const c={id:docC.id,...docC.data(),pedidos:[],pagamentos:[]};
      if(!c.ativo)continue;
      const snapP=await getDocs(query(collection(db,"clientes",docC.id,"pedidos"),orderBy("criadoEm","asc")));
      snapP.docs.forEach(d=>c.pedidos.push({id:d.id,...d.data()}));
      const snapPg=await getDocs(query(collection(db,"clientes",docC.id,"pagamentos"),orderBy("criadoEm","asc")));
      snapPg.docs.forEach(d=>c.pagamentos.push({id:d.id,...d.data()}));
      if(c.pedidos.length>0)lista.push(c);
    }
    lista.sort((a,b)=>a.nome.localeCompare(b.nome,"pt-BR"));
    todosClientes=lista; renderizar(lista);
    document.getElementById("loading-overlay").classList.add("hide");
  }

  function renderizar(lista){
    const el=document.getElementById("lista"),skel=document.getElementById("skeleton"),empty=document.getElementById("empty");
    skel.style.display="none";
    if(!lista.length){el.style.display="none";empty.style.display="block";atualizarTotais([]);return;}
    empty.style.display="none";el.style.display="block";

    el.innerHTML=lista.map((c,i)=>{
      const divida=calcDivida(c.pedidos),pago=calcPago(c.pagamentos),saldo=calcSaldo(c);
      const trufas=c.pedidos.filter(p=>p.produto==="Trufa").reduce((a,p)=>a+p.quantidade,0);
      const cones=c.pedidos.filter(p=>p.produto==="Cone").reduce((a,p)=>a+p.quantidade,0);
      const outros=c.pedidos.filter(p=>p.produto==="Outro");
      const pills=[
        trufas>0?"<span class='pill pill-trufa'>"+trufas+" trufa"+(trufas>1?"s":"")+"</span>":"",
        cones>0?"<span class='pill pill-cone'>"+cones+" cone"+(cones>1?"s":"")+"</span>":"",
        outros.length>0?"<span class='pill pill-outro'>"+outros.length+" outro"+(outros.length>1?"s":"")+"</span>":"",
      ].filter(Boolean).join("");

      // valor no header = saldo real
      let valCls="cliente-valor",valTxt="";
      if(saldo>0.001){valCls="cliente-valor deve";valTxt=fmtR(saldo);}
      else if(saldo<-0.001){valCls="cliente-valor credito";valTxt="crédito "+fmtR(Math.abs(saldo));}
      else{valCls="cliente-valor quitado";valTxt="quitado";}
      const pagLine=pago>0.001?"<div class='cliente-valor-pago'>pago "+fmtR(pago)+"</div>":"";

      const pedidosHTML=c.pedidos.map(p=>{
        const label=p.produto==="Outro"?(p.descricao||"outro"):p.produto;
        const val=p.produto==="Outro"?fmtR((p.preco||0)*p.quantidade):fmtR((PRECO[p.produto]||0)*p.quantidade);
        return "<div class='pedido-row'><span class='pedido-data'>"+(p.data||"")+"</span><span class='pedido-desc'>"+p.quantidade+"× "+label+(p.obs?" · <em style='color:var(--mutedL);font-size:.84rem'>"+p.obs+"</em>":"")+"</span><span class='pedido-val'>"+val+"</span></div>";
      }).join("");

      // resumo de pagamentos
      let pagResumoHTML="";
      if(c.pagamentos.length>0){
        const saldoCor=saldo>0.001?"var(--choco)":saldo<-0.001?"var(--cara)":"var(--muted)";
        const saldoTxt=saldo>0.001?fmtR(saldo)+" restante":saldo<-0.001?"crédito "+fmtR(Math.abs(saldo)):"quitado";
        pagResumoHTML="<div class='pag-resumo'><div class='pag-resumo-titulo'>Pagamentos recebidos</div>"+
          c.pagamentos.map(p=>"<div class='pag-resumo-row'><span class='pag-resumo-data'>"+(p.data||"—")+"</span><span class='pag-resumo-desc'>"+(p.obs||"pagamento")+"</span><span class='pag-resumo-val'>+ "+fmtR(p.valor||0)+"</span></div>").join("")+
          "<div class='saldo-linha'><span class='saldo-linha-lbl'>saldo a receber</span><span class='saldo-linha-val' style='color:"+saldoCor+";'>"+saldoTxt+"</span></div></div>";
      }

      return "<div class='cliente-card fade-up' style='animation-delay:"+i*0.05+"s' id='card-"+c.id+"'>"+
        "<div class='cliente-header' onclick=\"toggleCard('"+c.id+"')\">"+
          "<div style='flex:1;'><div class='cliente-nome'>"+c.nome+"</div><div class='cliente-pills'>"+pills+"</div></div>"+
          "<div style='text-align:right;'><div class='"+valCls+"'>"+valTxt+"</div>"+pagLine+"</div>"+
          "<div class='cliente-chevron'>▾</div>"+
        "</div>"+
        "<div class='pedidos-lista'>"+pedidosHTML+"</div>"+
        pagResumoHTML+
      "</div>";
    }).join("");

    atualizarTotais(lista);
  }

  function atualizarTotais(lista){
    // a receber = soma dos saldos positivos
    const aReceber=lista.reduce((a,c)=>{const s=calcSaldo(c);return a+(s>0?s:0);},0);
    const trufas=lista.reduce((a,c)=>a+c.pedidos.filter(p=>p.produto==="Trufa").reduce((x,p)=>x+p.quantidade,0),0);
    const cones=lista.reduce((a,c)=>a+c.pedidos.filter(p=>p.produto==="Cone").reduce((x,p)=>x+p.quantidade,0),0);
    document.getElementById("tot-clientes").textContent=lista.length;
    document.getElementById("tot-trufas").textContent=trufas;
    document.getElementById("tot-cones").textContent=cones;
    document.getElementById("tot-valor").textContent=fmtR(aReceber);
  }

  window.toggleCard=id=>document.getElementById("card-"+id).classList.toggle("aberto");

  window.filtrar=v=>{
    const n=v.normalize("NFD").replace(/[\u0300-\u036f]/g,"").toLowerCase().trim();
    renderizar(n?todosClientes.filter(c=>c.nome.normalize("NFD").replace(/[\u0300-\u036f]/g,"").toLowerCase().includes(n)):todosClientes);
  };

  carregar();
</script>
<script src="menu.js"></script>
</body>
</html>
