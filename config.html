<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>kakaw · configurações</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Mono:wght@300;400&family=Jost:wght@200;300&family=Playfair+Display:ital,wght@1,400;1,700&display=swap" rel="stylesheet"/>
<style>
  :root{
    --bg:#F5EFE2; --bgCard:#EDE5D4; --div:#DDD4BC;
    --verde:#3A5C2C; --choco:#5C3418; --cara:#A07828;
    --dark:#1A1208; --muted:#8A7860; --mutedL:#B0A890; --white:#FFFCF5;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{background:var(--bg);}
  input::placeholder{color:var(--mutedL);font-family:'Jost',sans-serif;font-weight:300;}

  .inp{
    width:100%;padding:12px 14px;
    background:var(--white);border:1px solid var(--div);border-radius:5px;
    font-family:'Jost',sans-serif;font-weight:300;font-size:.95rem;
    color:var(--dark);outline:none;transition:border .2s, box-shadow .2s;
    -webkit-appearance:none;
  }
  .inp:focus{border-color:var(--verde);box-shadow:0 0 0 3px rgba(58,92,44,.12);}

  .ham{background:none;border:none;cursor:pointer;padding:6px;display:flex;flex-direction:column;gap:5px;}
  .ham span{display:block;width:20px;height:1px;background:var(--verde);}
  .ham span:nth-child(2){width:13px;}

  .lbl{font-family:'DM Mono',monospace;font-size:.46rem;letter-spacing:.32em;text-transform:uppercase;color:var(--muted);margin-bottom:8px;display:block;}

  .btn{
    padding:14px 22px;border:none;border-radius:5px;outline:none;cursor:pointer;
    font-family:'DM Mono',monospace;font-size:.5rem;letter-spacing:.3em;text-transform:uppercase;
    transition:background .2s, opacity .2s;
  }
  .btn-verde{background:var(--verde);color:var(--white);}
  .btn-verde:hover:not(:disabled){background:#4A7A38;}
  .btn-sair{background:none;border:1px solid var(--div);color:var(--muted);}
  .btn-sair:hover{border-color:var(--choco);color:var(--choco);}
  .btn:disabled{opacity:.5;cursor:default;}

  .card{background:var(--white);border:1px solid var(--div);border-radius:8px;padding:1.4rem;}

  .toast{
    position:fixed;bottom:28px;left:50%;transform:translateX(-50%);
    background:var(--verde);color:var(--white);
    padding:12px 28px;border-radius:5px;
    font-family:'DM Mono',monospace;font-size:.42rem;letter-spacing:.35em;text-transform:uppercase;
    box-shadow:0 4px 20px rgba(58,92,44,.3);white-space:nowrap;z-index:200;display:none;
  }
  .toast.show{display:block;}
  .toast.erro{background:var(--choco);}

  @keyframes florGira{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}

  /* ── Tela de login (fallback, acesso direto sem sessão) ── */
  #tela-login{
    min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;
  }
  .login-box{
    width:100%;max-width:320px;background:var(--white);border:1px solid var(--div);border-radius:8px;
    padding:40px 28px 28px;display:flex;flex-direction:column;align-items:center;gap:6px;color:var(--verde);
  }
  .login-title{font-family:'Playfair Display',serif;font-style:italic;font-weight:400;font-size:1.3rem;color:var(--dark);margin-top:6px;}
  .login-subtitle{font-family:'DM Mono',monospace;font-size:.42rem;letter-spacing:.35em;text-transform:uppercase;color:var(--choco);margin-bottom:18px;}
  .login-field{width:100%;margin-bottom:14px;}
  .login-erro{display:none;width:100%;text-align:left;font-family:'DM Mono',monospace;font-size:.44rem;letter-spacing:.2em;text-transform:uppercase;color:#A03030;margin:-6px 0 12px;}
  .login-erro.show{display:block;}

  #loading-overlay{
    position:fixed;inset:0;background:var(--bg);
    z-index:200;display:flex;align-items:center;justify-content:center;
    flex-direction:column;gap:1rem;transition:opacity .4s;
  }
  #loading-overlay.hide{opacity:0;pointer-events:none;}
</style>
</head>
<body>

<!-- LOADING -->
<div id="loading-overlay">
  <svg width="48" height="48" viewBox="0 0 96 96" fill="none">
    <circle cx="48" cy="48" r="10" stroke="#3A5C2C" stroke-width="1.5"/>
    <circle cx="48" cy="48" r="4" fill="#3A5C2C"/>
    <g style="animation:florGira 2s linear infinite;transform-origin:48px 48px;">
      <path d="M48 38 C43 26 31 25 30 35 C29 45 40 47 48 38Z" fill="#3A5C2C" opacity=".12" stroke="#3A5C2C" stroke-width="1.1"/>
      <path d="M58 48 C70 43 71 31 61 30 C51 29 49 40 58 48Z" fill="#5C3418" opacity=".12" stroke="#5C3418" stroke-width="1.1"/>
      <path d="M48 58 C53 70 65 71 66 61 C67 51 56 49 48 58Z" fill="#3A5C2C" opacity=".12" stroke="#3A5C2C" stroke-width="1.1"/>
      <path d="M38 48 C26 53 25 65 35 66 C45 67 47 56 38 48Z" fill="#5C3418" opacity=".12" stroke="#5C3418" stroke-width="1.1"/>
    </g>
  </svg>
  <div style="font-family:'DM Mono',monospace;font-size:.48rem;letter-spacing:.35em;text-transform:uppercase;color:var(--muted);">conectando...</div>
</div>

<!-- TELA DE LOGIN (fallback) -->
<div id="tela-login" style="display:none;">
  <div class="login-box">
    <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="#3A5C2C" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="3"/>
      <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
    </svg>
    <div class="login-title">Configurações</div>
    <div class="login-subtitle">acesso restrito</div>

    <div class="login-field">
      <span class="lbl">Usuário</span>
      <input class="inp" id="login-usuario" value="admin" autocomplete="username"/>
    </div>
    <div class="login-field">
      <span class="lbl">Senha</span>
      <input class="inp" id="login-senha" type="password" placeholder="digite a senha..." autocomplete="current-password"/>
    </div>

    <div id="login-erro" class="login-erro">usuário ou senha incorretos</div>

    <button class="btn btn-verde" id="login-entrar" style="width:100%;">entrar</button>
  </div>
</div>

<!-- PAINEL (visível somente com sessão válida) -->
<div id="painel" style="display:none;background:var(--bg);min-height:100vh;">

  <!-- NAV -->
  <div style="padding:16px 20px;display:flex;align-items:center;background:var(--bg);border-bottom:1px solid var(--div);position:sticky;top:0;z-index:50;">
    <button class="ham" onclick="openMenu()"><span></span><span></span><span></span></button>
    <div style="flex:1;display:flex;justify-content:center;align-items:center;gap:10px;">
      <svg width="24" height="24" viewBox="0 0 96 96" fill="none">
        <circle cx="48" cy="48" r="10" stroke="#3A5C2C" stroke-width="1.5"/>
        <circle cx="48" cy="48" r="4" fill="#3A5C2C"/>
        <path d="M48 38 C43 26 31 25 30 35 C29 45 40 47 48 38Z" fill="#3A5C2C" opacity=".12" stroke="#3A5C2C" stroke-width="1.1"/>
        <path d="M58 48 C70 43 71 31 61 30 C51 29 49 40 58 48Z" fill="#5C3418" opacity=".12" stroke="#5C3418" stroke-width="1.1"/>
        <path d="M48 58 C53 70 65 71 66 61 C67 51 56 49 48 58Z" fill="#3A5C2C" opacity=".12" stroke="#3A5C2C" stroke-width="1.1"/>
        <path d="M38 48 C26 53 25 65 35 66 C45 67 47 56 38 48Z" fill="#5C3418" opacity=".12" stroke="#5C3418" stroke-width="1.1"/>
      </svg>
      <div style="font-family:'Playfair Display',serif;font-style:italic;font-weight:400;font-size:1.28rem;color:var(--dark);letter-spacing:.02em;line-height:1;">kakaw</div>
    </div>
    <div style="width:34px;"></div>
  </div>

  <!-- LABEL SEÇÃO -->
  <div style="padding:2rem 8vw .8rem;display:flex;align-items:baseline;gap:1.5rem;">
    <span style="font-family:'DM Mono',monospace;font-size:.52rem;letter-spacing:.4em;text-transform:uppercase;color:var(--mutedL);">•</span>
    <span style="font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:300;font-size:1.5rem;color:var(--dark);">Configurações</span>
    <div style="flex:1;height:1px;background:var(--div);margin-bottom:3px;"></div>
    <span style="font-family:'DM Mono',monospace;font-size:.48rem;letter-spacing:.2em;text-transform:uppercase;color:var(--mutedL);">painel admin</span>
  </div>

  <!-- CONTEÚDO -->
  <div style="padding:0 8vw 4rem;display:flex;flex-direction:column;gap:1.4rem;">

    <!-- Placeholder das telas futuras -->
    <div class="card">
      <span class="lbl">Seções do painel</span>
      <div style="font-family:'Jost',sans-serif;font-weight:300;font-size:.9rem;color:var(--muted);line-height:1.7;">
        As telas de configuração ainda serão detalhadas e adicionadas aqui.
      </div>
    </div>

    <!-- Trocar credenciais -->
    <div class="card">
      <span class="lbl">Alterar usuário e senha</span>
      <div style="margin-bottom:1rem;">
        <span class="lbl">Usuário</span>
        <input class="inp" id="cfg-usuario" placeholder="usuário atual"/>
      </div>
      <div style="margin-bottom:1.2rem;">
        <span class="lbl">Nova senha</span>
        <input class="inp" id="cfg-senha" type="password" placeholder="deixe em branco para não alterar"/>
      </div>
      <button class="btn btn-verde" id="cfg-salvar">salvar alterações</button>
    </div>

    <!-- Sair -->
    <button class="btn btn-sair" id="btn-sair">sair do painel</button>

  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast">alterações salvas ✦</div>

<!-- AUTH (Firebase) -->
<script type="module" src="auth.js"></script>

<script type="module">
  function aguardarAuth() {
    if (window.kakawAuth) return Promise.resolve();
    return new Promise(resolve => {
      window.addEventListener("kakawAuthReady", () => resolve(), { once: true });
      setTimeout(() => { if (window.kakawAuth) resolve(); }, 3000);
    });
  }

  async function iniciar() {
    await aguardarAuth();
    document.getElementById("loading-overlay").classList.add("hide");

    if (window.kakawAuth.sessaoAtiva()) {
      mostrarPainel();
    } else {
      mostrarLogin();
    }
  }

  function mostrarPainel() {
    document.getElementById("tela-login").style.display = "none";
    document.getElementById("painel").style.display = "block";
    const inpUsuario = document.getElementById("cfg-usuario");
    // Preenche o campo de usuário atual (best-effort a partir da sessão salva)
    try {
      const sess = JSON.parse(localStorage.getItem("kakaw-admin-sessao") || "{}");
      if (sess.login) inpUsuario.value = sess.login;
    } catch (e) {}
  }

  function mostrarLogin() {
    document.getElementById("painel").style.display = "none";
    document.getElementById("tela-login").style.display = "flex";
    setTimeout(() => document.getElementById("login-senha").focus(), 100);
  }

  async function tentarLogin() {
    const btn   = document.getElementById("login-entrar");
    const erro  = document.getElementById("login-erro");
    const login = document.getElementById("login-usuario").value.trim();
    const senha = document.getElementById("login-senha").value;

    erro.classList.remove("show");
    btn.disabled = true;
    btn.textContent = "verificando...";

    try {
      const ok = await window.kakawAuth.verificar(login, senha);
      if (ok) {
        window.kakawAuth.salvarSessao(login);
        mostrarPainel();
      } else {
        erro.classList.add("show");
        btn.disabled = false;
        btn.textContent = "entrar";
      }
    } catch (e) {
      console.error("Erro ao validar login:", e);
      erro.textContent = "erro de conexão, tente novamente";
      erro.classList.add("show");
      btn.disabled = false;
      btn.textContent = "entrar";
    }
  }

  document.getElementById("login-entrar").addEventListener("click", tentarLogin);
  document.getElementById("login-senha").addEventListener("keydown", e => {
    if (e.key === "Enter") tentarLogin();
  });

  document.getElementById("btn-sair").addEventListener("click", () => {
    window.kakawAuth.sair();
    window.location.href = "index.html";
  });

  document.getElementById("cfg-salvar").addEventListener("click", async () => {
    const btn   = document.getElementById("cfg-salvar");
    const toast = document.getElementById("toast");
    const novoLogin = document.getElementById("cfg-usuario").value.trim();
    const novaSenha = document.getElementById("cfg-senha").value;

    if (!novoLogin) {
      toast.textContent = "informe um usuário válido ✕";
      toast.classList.add("show", "erro");
      setTimeout(() => toast.classList.remove("show", "erro"), 3000);
      return;
    }

    btn.disabled = true;
    btn.textContent = "salvando...";
    try {
      await window.kakawAuth.trocarLogin(novoLogin);
      if (novaSenha) await window.kakawAuth.trocarSenha(novaSenha);
      window.kakawAuth.salvarSessao(novoLogin);
      document.getElementById("cfg-senha").value = "";
      toast.textContent = "alterações salvas ✦";
      toast.classList.remove("erro");
      toast.classList.add("show");
      setTimeout(() => toast.classList.remove("show"), 2500);
    } catch (e) {
      console.error("Erro ao salvar credenciais:", e);
      toast.textContent = "erro ao salvar ✕";
      toast.classList.add("show", "erro");
      setTimeout(() => toast.classList.remove("show", "erro"), 3000);
    } finally {
      btn.disabled = false;
      btn.textContent = "salvar alterações";
    }
  });

  iniciar();
</script>

<!-- MENU COMPARTILHADO -->
<script src="menu.js"></script>
</body>
</html>
