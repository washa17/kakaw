<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>kakaw · mensagem</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Mono:wght@300;400&family=Jost:wght@200;300&family=Playfair+Display:ital,wght@1,400;1,700&display=swap" rel="stylesheet"/>
<style>
  :root{--bg:#F5EFE2;--bgCard:#EDE5D4;--div:#DDD4BC;--verde:#3A5C2C;--choco:#5C3418;--cara:#A07828;--dark:#1A1208;--muted:#8A7860;--mutedL:#B0A890;--white:#FFFCF5;}
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{background:var(--bg);}
  .ham{background:none;border:none;cursor:pointer;padding:6px;display:flex;flex-direction:column;gap:5px;}
  .ham span{display:block;width:20px;height:1px;background:var(--verde);}
  .ham span:nth-child(2){width:13px;}
  .lbl{font-family:'DM Mono',monospace;font-size:.46rem;letter-spacing:.32em;text-transform:uppercase;color:var(--muted);margin-bottom:8px;display:block;}
  @keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  @keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
  @keyframes florGira{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
  .fade-up{animation:fadeUp .4s ease both;}
  .skeleton-row{height:72px;border-radius:3px;margin-bottom:10px;background:linear-gradient(90deg,var(--div) 25%,var(--bgCard) 50%,var(--div) 75%);background-size:200% 100%;animation:shimmer 1.4s ease-in-out infinite;}
  #loading-overlay{position:fixed;inset:0;background:var(--bg);z-index:200;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:1rem;transition:opacity .4s;}
  #loading-overlay.hide{opacity:0;pointer-events:none;}
  .inp-busca{width:100%;padding:11px 14px;background:var(--white);border:1px solid var(--div);border-radius:5px;font-family:'Jost',sans-serif;font-weight:300;font-size:.95rem;color:var(--dark);outline:none;transition:border .2s;}
  .inp-busca:focus{border-color:var(--verde);}
  .inp-busca::placeholder{color:var(--mutedL);}
  #template-box{display:none;}
  #template-box.show{display:block;}
  .template-textarea{width:100%;padding:14px;background:var(--white);border:1px solid var(--div);border-radius:5px;font-family:'Jost',sans-serif;font-weight:300;font-size:.88rem;color:var(--dark);outline:none;resize:vertical;min-height:220px;line-height:1.7;transition:border .2s;}
  .template-textarea:focus{border-color:var(--verde);}
  .btn-alterar{background:none;border:1px solid var(--div);border-radius:5px;padding:9px 18px;cursor:pointer;font-family:'DM Mono',monospace;font-size:.48rem;letter-spacing:.28em;text-transform:uppercase;color:var(--muted);transition:all .2s;}
  .btn-alterar:hover{border-color:var(--verde);color:var(--verde);}
  .btn-alterar.ativo{border-color:var(--verde);color:var(--verde);background:rgba(58,92,44,.05);}
  .btn-salvar-template{padding:10px 20px;background:var(--verde);border:none;border-radius:5px;font-family:'DM Mono',monospace;font-size:.48rem;letter-spacing:.28em;text-transform:uppercase;color:var(--white);cursor:pointer;transition:background .2s;}
  .btn-salvar-template:hover{background:#4A7A38;}
  .btn-cancelar-template{padding:10px 20px;background:none;border:1px solid var(--div);border-radius:5px;font-family:'DM Mono',monospace;font-size:.48rem;letter-spacing:.28em;text-transform:uppercase;color:var(--muted);cursor:pointer;transition:all .2s;}
  .btn-cancelar-template:hover{border-color:var(--choco);color:var(--choco);}
  .msg-card{background:var(--white);border:1px solid var(--div);border-radius:5px;margin-bottom:10px;overflow:hidden;}
  .msg-header{padding:14px 16px;display:flex;align-items:center;gap:12px;cursor:pointer;border-bottom:1px solid transparent;transition:border-color .2s;}
  .msg-card.aberto .msg-header{border-bottom-color:var(--div);}
  .msg-nome{font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:300;font-size:1.18rem;color:var(--dark);flex:1;}
  .msg-valor{font-family:'DM Mono',monospace;font-size:.52rem;letter-spacing:.1em;color:var(--verde);}
  .msg-chevron{font-size:.7rem;color:var(--mutedL);transition:transform .25s;}
  .msg-card.aberto .msg-chevron{transform:rotate(180deg);}
  .msg-body{display:none;padding:16px;}
  .msg-card.aberto .msg-body{display:block;}
  .msg-texto{background:var(--bgCard);border-radius:5px;padding:14px 16px;margin-bottom:12px;font-family:'Jost',sans-serif;font-weight:300;font-size:.88rem;color:var(--dark);line-height:1.85;white-space:pre-wrap;border:1px solid var(--div);}
  .btn-copiar{width:100%;padding:12px;background:var(--verde);border:none;border-radius:5px;font-family:'DM Mono',monospace;font-size:.48rem;letter-spacing:.3em;text-transform:uppercase;color:var(--white);cursor:pointer;transition:background .2s;}
  .btn-copiar:hover{background:#4A7A38;}
  .btn-copiar.copiado{background:var(--choco);}
  .vars{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;}
  .var-tag{font-family:'DM Mono',monospace;font-size:.44rem;letter-spacing:.1em;background:var(--bgCard);border:1px solid var(--div);border-radius:3px;padding:3px 8px;color:var(--muted);cursor:default;}
</style>
</head>
<body>
<div id="loading-overlay">
  <svg width="48" height="48" viewBox="0 0 96 96" fill="none"><circle cx="48" cy="48" r="10" stroke="#3A5C2C" stroke-width="1.5"/><circle cx="48" cy="48" r="4" fill="#3A5C2C"/><g style="animation:florGira 2s linear infinite;transform-origin:48px 48px;"><path d="M48 38 C43 26 31 25 30 35 C29 45 40 47 48 38Z" fill="#3A5C2C" opacity=".12" stroke="#3A5C2C" stroke-width="1.1"/><path d="M58 48 C70 43 71 31 61 30 C51 29 49 40 58 48Z" fill="#5C3418" opacity=".12" stroke="#5C3418" stroke-width="1.1"/><path d="M48 58 C53 70 65 71 66 61 C67 51 56 49 48 58Z" fill="#3A5C2C" opacity=".12" stroke="#3A5C2C" stroke-width="1.1"/><path d="M38 48 C26 53 25 65 35 66 C45 67 47 56 38 48Z" fill="#5C3418" opacity=".12" stroke="#5C3418" stroke-width="1.1"/></g></svg>
  <div style="font-family:'DM Mono',monospace;font-size:.48rem;letter-spacing:.35em;text-transform:uppercase;color:var(--muted);">carregando...</div>
</div>

<div style="background:var(--bg);min-height:100vh;padding-bottom:40px;">
  <div style="padding:16px 20px;display:flex;align-items:center;background:var(--bg);border-bottom:1px solid var(--div);position:sticky;top:0;z-index:50;">
    <button class="ham" onclick="openMenu()"><span></span><span></span><span></span></button>
    <div style="flex:1;display:flex;justify-content:center;align-items:center;gap:10px;">
      <svg width="24" height="24" viewBox="0 0 96 96" fill="none"><circle cx="48" cy="48" r="10" stroke="#3A5C2C" stroke-width="1.5"/><circle cx="48" cy="48" r="4" fill="#3A5C2C"/><path d="M48 38 C43 26 31 25 30 35 C29 45 40 47 48 38Z" fill="#3A5C2C" opacity=".12" stroke="#3A5C2C" stroke-width="1.1"/><path d="M58 48 C70 43 71 31 61 30 C51 29 49 40 58 48Z" fill="#5C3418" opacity=".12" stroke="#5C3418" stroke-width="1.1"/><path d="M48 58 C53 70 65 71 66 61 C67 51 56 49 48 58Z" fill="#3A5C2C" opacity=".12" stroke="#3A5C2C" stroke-width="1.1"/><path d="M38 48 C26 53 25 65 35 66 C45 67 47 56 38 48Z" fill="#5C3418" opacity=".12" stroke="#5C3418" stroke-width="1.1"/></svg>
      <div style="font-family:'Playfair Display',serif;font-style:italic;font-weight:400;font-size:1.28rem;color:var(--dark);">kakaw</div>
    </div>
    <div style="width:34px;"></div>
  </div>

  <div style="padding:2rem 8vw .8rem;display:flex;align-items:baseline;gap:1.5rem;">
    <span style="font-family:'DM Mono',monospace;font-size:.52rem;letter-spacing:.4em;text-transform:uppercase;color:var(--mutedL);">03</span>
    <span style="font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:300;font-size:1.5rem;color:var(--dark);">Mensagem</span>
    <div style="flex:1;height:1px;background:var(--div);margin-bottom:3px;"></div>
    <span style="font-family:'DM Mono',monospace;font-size:.48rem;letter-spacing:.2em;text-transform:uppercase;color:var(--mutedL);">whatsapp</span>
  </div>

  <div style="padding:0 8vw;">
    <div style="margin-bottom:1.6rem;">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
        <span class="lbl" style="margin-bottom:0;">Padrão da mensagem</span>
        <button class="btn-alterar" id="btn-alterar" onclick="toggleTemplate()">alterar formato</button>
      </div>
      <div id="template-box">
        <div style="margin-bottom:8px;">
          <div class="vars">
            <span class="var-tag">{NOME}</span>
            <span class="var-tag">{LISTA_PEDIDOS}</span>
            <span class="var-tag">{TOTAL}</span>
          </div>
          <div style="font-family:'DM Mono',monospace;font-size:.44rem;letter-spacing:.12em;color:var(--mutedL);margin-bottom:10px;">use as variáveis acima no template</div>
        </div>
        <textarea class="template-textarea" id="template-textarea"></textarea>
        <div style="display:flex;gap:8px;margin-top:10px;">
          <button class="btn-salvar-template" onclick="salvarTemplate()">salvar template</button>
          <button class="btn-cancelar-template" onclick="cancelarTemplate()">cancelar</button>
        </div>
      </div>
    </div>

    <div style="height:1px;background:var(--div);margin-bottom:1.4rem;"></div>
    <div style="margin-bottom:1.2rem;"><input class="inp-busca" id="inp-busca" placeholder="buscar cliente..." oninput="filtrar(this.value)"/></div>
    <div id="skeleton"><div class="skeleton-row"></div><div class="skeleton-row"></div><div class="skeleton-row"></div></div>
    <div id="lista" style="display:none;"></div>
    <div id="empty" style="display:none;text-align:center;padding:3rem 0;"><div style="font-family:'Cormorant Garamond',serif;font-style:italic;font-size:1.28rem;color:var(--muted);">nenhum cliente encontrado</div></div>
  </div>
</div>

<footer style="background:var(--bg);border-top:1px solid var(--div);padding:1.2rem 8vw;text-align:center;">
  <div style="display:flex;flex-direction:column;align-items:center;gap:.5rem;">
    <svg width="20" height="20" viewBox="0 0 96 96" fill="none"><circle cx="48" cy="48" r="10" stroke="#3A5C2C" stroke-width="1.5"/><circle cx="48" cy="48" r="4" fill="#3A5C2C"/><path d="M48 38 C43 26 31 25 30 35 C29 45 40 47 48 38Z" fill="#3A5C2C" opacity=".12" stroke="#3A5C2C" stroke-width="1.1"/><path d="M58 48 C70 43 71 31 61 30 C51 29 49 40 58 48Z" fill="#5C3418" opacity=".12" stroke="#5C3418" stroke-width="1.1"/><path d="M48 58 C53 70 65 71 66 61 C67 51 56 49 48 58Z" fill="#3A5C2C" opacity=".12" stroke="#3A5C2C" stroke-width="1.1"/><path d="M38 48 C26 53 25 65 35 66 C45 67 47 56 38 48Z" fill="#5C3418" opacity=".12" stroke="#5C3418" stroke-width="1.1"/></svg>
    <div style="font-family:'DM Mono',monospace;font-size:.46rem;letter-spacing:.3em;text-transform:uppercase;color:var(--mutedL);">kakaw · doces artesanais</div>
  </div>
</footer>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, getDocs, doc, getDoc, setDoc, query, orderBy }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const app=initializeApp({apiKey:"AIzaSyCv8YuWm13yscXDWfkIRvFtRy6ZVO0Wgok",authDomain:"kakaw-web.firebaseapp.com",projectId:"kakaw-web",storageBucket:"kakaw-web.firebasestorage.app",messagingSenderId:"229104514189",appId:"1:229104514189:web:3ae6c7c3de736f508e9ec4"});
  const db=getFirestore(app), PRECO={Trufa:3,Cone:10};

  // Template padrão — idêntico ao original; linha de pagamento só aparece se pago > 0
  const TEMPLATE_PADRAO=`Oiie, {NOME}! Boa tarde 🌸💖\nAmiga até agora você pegou\n\n{LISTA_PEDIDOS}\nTotalizando R$\{TOTAL\} 🍫\n\nPix pra facilitar: 11948734299\n(Washington Gabriel) 💌\n\nSó pra te ajudar a lembrar, tá?\nBeijinhos doces 😘🍬`;

  let templateAtual=TEMPLATE_PADRAO, todosClientes=[], editandoTemplate=false;

  const fmtR=n=>"R$"+n.toFixed(2).replace(".",",");
  const calcDivida=ps=>ps.reduce((a,p)=>a+(p.produto==="Outro"?(p.preco||0)*p.quantidade:(PRECO[p.produto]||0)*p.quantidade),0);
  const calcPago=pgs=>(pgs||[]).reduce((a,p)=>a+(p.valor||0),0);
  const calcSaldo=c=>calcDivida(c.pedidos)-calcPago(c.pagamentos);

  async function carregarTemplate(){
    try{
      const snap=await getDoc(doc(db,"config","template"));
      if(snap.exists()&&snap.data().texto)templateAtual=snap.data().texto;
    }catch(e){console.warn("sem template salvo");}
  }

  async function carregarClientes(){
    const snapC=await getDocs(collection(db,"clientes"));
    const lista=[];
    for(const docC of snapC.docs){
      const c={id:docC.id,...docC.data(),pedidos:[],pagamentos:[]};
      if(!c.ativo)continue;
      const snapP=await getDocs(query(collection(db,"clientes",docC.id,"pedidos"),orderBy("criadoEm","asc")));
      snapP.docs.forEach(d=>c.pedidos.push({id:d.id,...d.data()}));
      const snapPg=await getDocs(query(collection(db,"clientes",docC.id,"pagamentos"),orderBy("criadoEm","asc")));
      snapPg.docs.forEach(d=>c.pagamentos.push({id:d.id,...d.data()}));
      if(c.pedidos.length>0)lista.push(c);
    }
    lista.sort((a,b)=>a.nome.localeCompare(b.nome,"pt-BR"));
    todosClientes=lista;
  }

  function gerarListaPedidos(pedidos){
    const mapa={};
    pedidos.forEach(p=>{
      const ch=p.data+"||"+p.produto+"||"+(p.descricao||"");
      if(!mapa[ch])mapa[ch]={...p,quantidade:0};
      mapa[ch].quantidade+=p.quantidade;
    });
    return Object.values(mapa).map(p=>{
      if(p.produto==="Trufa")return p.quantidade+"  Trufas em  "+p.data+";";
      if(p.produto==="Cone") return p.quantidade+"  Cones em  "+p.data+";";
      return p.quantidade+"  "+p.descricao+" em  "+p.data+"; (R$"+(p.preco*p.quantidade).toFixed(2).replace(".",",")+")";
    }).join("\n");
  }

  function calcTotal(pedidos){return pedidos.reduce((a,p)=>a+(p.produto==="Outro"?(p.preco||0)*p.quantidade:(PRECO[p.produto]||0)*p.quantidade),0);}

  function gerarMensagem(cliente){
    const lista=gerarListaPedidos(cliente.pedidos);
    const total=calcTotal(cliente.pedidos);
    const pago=calcPago(cliente.pagamentos);
    const saldo=calcSaldo(cliente);

    // base: igual ao original para todos
    let msg=templateAtual
      .replace(/\{NOME\}/g,cliente.nome)
      .replace(/\{LISTA_PEDIDOS\}/g,lista)
      .replace(/\{TOTAL\}/g,total.toFixed(2).replace(".",","));

    // adiciona bloco de pagamento SOMENTE se houver pagamento registrado
    if(pago>0.001){
      const linhaPago="Você já pagou "+fmtR(pago);
      let linhaFinal="";
      if(saldo>0.001)       linhaFinal="Ainda deve "+fmtR(saldo);
      else if(saldo<-0.001) linhaFinal="Você tem "+fmtR(Math.abs(saldo))+" de crédito conosco 🌟";
      else                  linhaFinal="Dívida quitada ✦";

      // insere após a linha do Totalizando
      msg=msg+"\n\n"+linhaPago+"\n"+linhaFinal;
    }

    return msg;
  }

  function renderizar(lista){
    const el=document.getElementById("lista"),skel=document.getElementById("skeleton"),empty=document.getElementById("empty");
    skel.style.display="none";
    if(!lista.length){el.style.display="none";empty.style.display="block";return;}
    empty.style.display="none";el.style.display="block";

    el.innerHTML=lista.map((c,i)=>{
      const total=calcTotal(c.pedidos).toFixed(2).replace(".",",");
      const msg=gerarMensagem(c);
      return "<div class='msg-card fade-up' style='animation-delay:"+i*0.04+"s' id='msgcard-"+c.id+"'>"+
        "<div class='msg-header' onclick=\"toggleMsg('"+c.id+"')\">"+
          "<div class='msg-nome'>"+c.nome+"</div>"+
          "<div class='msg-valor'>R$"+total+"</div>"+
          "<div class='msg-chevron'>▾</div>"+
        "</div>"+
        "<div class='msg-body'>"+
          "<div class='msg-texto' id='msgtxt-"+c.id+"'>"+msg+"</div>"+
          "<button class='btn-copiar' id='btncp-"+c.id+"' onclick=\"copiar('"+c.id+"')\">copiar mensagem</button>"+
        "</div>"+
      "</div>";
    }).join("");
  }

  window.toggleMsg=id=>document.getElementById("msgcard-"+id).classList.toggle("aberto");

  window.copiar=id=>{
    const txt=document.getElementById("msgtxt-"+id).textContent;
    const btn=document.getElementById("btncp-"+id);
    navigator.clipboard.writeText(txt).then(()=>{
      btn.textContent="✦  copiado!";btn.classList.add("copiado");
      setTimeout(()=>{btn.textContent="copiar mensagem";btn.classList.remove("copiado");},2000);
    });
  };

  window.toggleTemplate=()=>{
    editandoTemplate=!editandoTemplate;
    const box=document.getElementById("template-box"),btn=document.getElementById("btn-alterar");
    if(editandoTemplate){document.getElementById("template-textarea").value=templateAtual;box.classList.add("show");btn.classList.add("ativo");btn.textContent="fechar";}
    else{box.classList.remove("show");btn.classList.remove("ativo");btn.textContent="alterar formato";}
  };

  window.cancelarTemplate=()=>{
    editandoTemplate=false;
    document.getElementById("template-box").classList.remove("show");
    const btn=document.getElementById("btn-alterar");btn.classList.remove("ativo");btn.textContent="alterar formato";
  };

  window.salvarTemplate=async()=>{
    const novo=document.getElementById("template-textarea").value.trim();if(!novo)return;
    try{await setDoc(doc(db,"config","template"),{texto:novo});templateAtual=novo;renderizar(todosClientes);window.cancelarTemplate();}
    catch(e){alert("Erro ao salvar template.");}
  };

  window.filtrar=v=>{
    const n=v.normalize("NFD").replace(/[\u0300-\u036f]/g,"").toLowerCase().trim();
    renderizar(n?todosClientes.filter(c=>c.nome.normalize("NFD").replace(/[\u0300-\u036f]/g,"").toLowerCase().includes(n)):todosClientes);
  };

  async function init(){
    await carregarTemplate();
    await carregarClientes();
    renderizar(todosClientes);
    document.getElementById("loading-overlay").classList.add("hide");
  }
  init();
</script>
<script src="menu.js"></script>
</body>
</html>
